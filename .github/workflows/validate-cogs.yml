name: Validate cogs.json

on:
  pull_request:
    paths:
      - "data/cogs.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Check cogs.json is valid JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -c "import json, sys; json.load(open('data/cogs.json')); print('cogs.json is valid JSON')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tomli

      - name: Check for missing releases
        id: check_releases
        run: |
          python scripts/check_releases.py missing-releases.md || true
          if [ -s missing-releases.md ]; then
            echo "has_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR about missing releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- missing-release-check -->';
            const hasMissing = '${{ steps.check_releases.outputs.has_missing }}' === 'true';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (!hasMissing) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const details = fs.readFileSync('missing-releases.md', 'utf8');
            const body = `${marker}\n### ⚠️ Missing release\n\nThe following cog(s) declare a version in \`pyproject.toml\` with no matching git tag/release. They won't appear on the site until a release is cut:\n\n${details}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
